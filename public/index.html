<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#0A0A0B">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PT Mouss">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>PT Mouss IA</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap');

:root{
  --bg:#0A0A0B; --bg2:#050506; --panel:#0F0F11; --panel2:#151517;
  --gold:#F2B233; --gold-dim:#C8901E; --gold-line:rgba(242,178,51,.35);
  --ink:#FFF; --muted:#A7A7AD; --line:rgba(255,255,255,.09);
  --ok:#4ED07A; --ko:#E5484D; --blue:#5B9DF9;
  --safe-top:env(safe-area-inset-top,0px); --safe-bot:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none}
html,body{height:100%;overflow:hidden}
body{background:var(--bg2);font-family:Inter,system-ui,sans-serif;color:var(--ink);
-webkit-font-smoothing:antialiased;overscroll-behavior:none}

#app{max-width:520px;margin:0 auto;height:100dvh;background:var(--bg);
display:flex;flex-direction:column;position:relative;overflow:hidden}

/* ═══ ANIMATIONS ═══ */
@keyframes slideUp{from{opacity:0;transform:translateY(26px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideLeft{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pop{0%{transform:scale(.6);opacity:0}60%{transform:scale(1.12)}100%{transform:scale(1);opacity:1}}
@keyframes bounce{0%{transform:scale(1)}35%{transform:scale(1.25)}100%{transform:scale(1)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes ringFill{from{stroke-dashoffset:339}to{stroke-dashoffset:0}}
@keyframes floatUp{0%{opacity:1;transform:translateY(0) rotate(0)}100%{opacity:0;transform:translateY(-110px) rotate(24deg)}}
@keyframes glowPulse{0%,100%{box-shadow:0 0 0 0 rgba(242,178,51,.35)}50%{box-shadow:0 0 24px 4px rgba(242,178,51,.18)}}
@keyframes barGrow{from{transform:scaleY(0)}to{transform:scaleY(1)}}
@keyframes checkDraw{from{stroke-dashoffset:48}to{stroke-dashoffset:0}}

.screen{flex:1;overflow-y:auto;overflow-x:hidden;padding:0 18px calc(96px + var(--safe-bot));
animation:slideLeft .32s cubic-bezier(.22,.9,.3,1)}
.screen.back{animation:fadeIn .25s ease}
.anim-item{animation:slideUp .4s cubic-bezier(.22,.9,.3,1) both}

/* ═══ HEADER ═══ */
.top{padding:calc(14px + var(--safe-top)) 18px 12px;background:rgba(12,12,14,.92);
backdrop-filter:blur(14px);border-bottom:1px solid var(--gold-line);
display:flex;align-items:center;gap:11px;z-index:20}
.jc{font-family:Oswald;font-weight:700;font-size:16px;color:var(--gold);
border:2px solid var(--gold);border-radius:8px;padding:2px 8px;line-height:1.2}
.brand{font-family:Oswald;font-weight:700;font-size:15px;letter-spacing:.12em}
.brand span{color:var(--gold)}
.brand-sub{font-size:8.5px;color:var(--muted);letter-spacing:.18em;text-transform:uppercase;margin-top:2px}
.top-right{margin-left:auto;text-align:right}
.top-right .n{font-family:Oswald;font-size:12px;color:var(--gold);text-transform:uppercase}
.top-right .s{font-size:9px;color:var(--muted);margin-top:2px}

/* ═══ TAB BAR ═══ */
.tabbar{position:absolute;bottom:0;left:0;right:0;background:rgba(12,12,14,.94);
backdrop-filter:blur(18px);border-top:1px solid var(--line);
display:flex;padding:8px 8px calc(8px + var(--safe-bot));z-index:30}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
padding:7px 2px;border:none;background:none;color:var(--muted);cursor:pointer;
border-radius:12px;transition:transform .18s cubic-bezier(.34,1.56,.64,1)}
.tab:active{transform:scale(.88)}
.tab .ico{font-size:19px;transition:transform .25s cubic-bezier(.34,1.56,.64,1)}
.tab .lb{font-family:Oswald;font-size:8.5px;letter-spacing:.08em;text-transform:uppercase}
.tab.on{color:var(--gold)}
.tab.on .ico{transform:translateY(-2px) scale(1.14)}
.tab .dot{width:4px;height:4px;border-radius:50%;background:var(--gold);
opacity:0;transition:opacity .2s}
.tab.on .dot{opacity:1;animation:pop .3s}

/* ═══ COMPOSANTS ═══ */
.h1{font-family:Oswald;font-weight:700;font-size:24px;text-transform:uppercase;
line-height:1.12;padding-top:18px;margin-bottom:4px}
.h1 em{color:var(--gold);font-style:normal}
.sub{font-size:13px;color:var(--muted);margin-bottom:16px;line-height:1.5}
.eyebrow{font-family:Oswald;font-size:10.5px;letter-spacing:.18em;color:var(--gold);
text-transform:uppercase;margin:20px 0 9px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:16px;
padding:16px;margin-bottom:11px}
.card.gold{border-color:var(--gold-line)}
.card.glow{animation:glowPulse 2.6s ease-in-out infinite}

.btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;
border:none;border-radius:14px;padding:16px;font-family:Oswald;font-weight:700;
font-size:14px;letter-spacing:.07em;text-transform:uppercase;cursor:pointer;
transition:transform .15s cubic-bezier(.34,1.56,.64,1),opacity .2s}
.btn:active{transform:scale(.96)}
.btn.p{background:var(--gold);color:#1a1206}
.btn.s{background:transparent;border:1.5px solid var(--line);color:var(--ink)}
.btn:disabled{opacity:.35;pointer-events:none}
.row{display:flex;gap:10px}
.row .btn{flex:1}

.choice{background:var(--panel);border:1.5px solid var(--gold-line);border-radius:14px;
padding:16px;margin-bottom:9px;font-size:15px;font-weight:500;display:flex;
justify-content:space-between;align-items:center;cursor:pointer;
transition:transform .15s,border-color .2s,background .2s}
.choice:active{transform:scale(.97)}
.choice.sel{border-color:var(--gold);background:rgba(242,178,51,.08)}
.choice .chk{color:var(--gold);font-weight:700;opacity:0;transform:scale(.5);
transition:all .22s cubic-bezier(.34,1.56,.64,1)}
.choice.sel .chk{opacity:1;transform:scale(1)}

.input{width:100%;background:var(--panel);border:1.5px solid var(--gold-line);
border-radius:14px;padding:16px;color:var(--ink);font-size:16px;font-family:inherit;
outline:none;transition:border-color .2s}
.input:focus{border-color:var(--gold)}
textarea.input{resize:none;line-height:1.5}

.progress-dots{display:flex;gap:5px;margin:16px 0}
.pdot{flex:1;height:4px;border-radius:3px;background:var(--line);transition:background .3s}
.pdot.on{background:var(--gold)}

/* série boutons */
.setbtn{width:46px;height:46px;border-radius:13px;font-family:Oswald;font-weight:700;
font-size:16px;cursor:pointer;background:var(--panel2);border:1.5px solid var(--line);
color:var(--ink);transition:all .18s cubic-bezier(.34,1.56,.64,1)}
.setbtn:active{transform:scale(.88)}
.setbtn.done{background:var(--gold);border-color:var(--gold);color:#1a1206;
animation:bounce .35s cubic-bezier(.34,1.56,.64,1)}

/* timer circulaire */
.timer-wrap{position:fixed;inset:0;background:rgba(5,5,6,.88);backdrop-filter:blur(10px);
display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:60;
animation:fadeIn .25s}
.timer-ring{position:relative;width:190px;height:190px}
.timer-ring svg{transform:rotate(-90deg)}
.timer-ring .track{fill:none;stroke:var(--panel2);stroke-width:9}
.timer-ring .fill{fill:none;stroke:var(--gold);stroke-width:9;stroke-linecap:round;
stroke-dasharray:339;transition:stroke-dashoffset 1s linear}
.timer-num{position:absolute;inset:0;display:flex;flex-direction:column;
align-items:center;justify-content:center}
.timer-num .t{font-family:Oswald;font-weight:700;font-size:52px;color:var(--gold);line-height:1}
.timer-num .l{font-size:10px;color:var(--muted);letter-spacing:.14em;text-transform:uppercase;margin-top:5px}

/* confetti fin de séance */
.confetti{position:fixed;pointer-events:none;font-size:22px;animation:floatUp 1.3s ease-out forwards;z-index:70}

/* barre suivi */
.chartbar{background:var(--gold);border-radius:4px 4px 0 0;transform-origin:bottom;
animation:barGrow .5s cubic-bezier(.22,.9,.3,1) both}

/* splash */
#splash{position:fixed;inset:0;background:var(--bg2);display:flex;flex-direction:column;
align-items:center;justify-content:center;z-index:100;transition:opacity .5s,visibility .5s}
#splash.off{opacity:0;visibility:hidden}
#splash .logo{font-family:Oswald;font-weight:700;font-size:34px;color:var(--gold);
border:3px solid var(--gold);border-radius:16px;padding:8px 18px;animation:pop .6s cubic-bezier(.34,1.56,.64,1)}
#splash .t{font-family:Oswald;font-size:15px;letter-spacing:.28em;margin-top:18px;
text-transform:uppercase;animation:fadeIn .8s .3s both}
#splash .t span{color:var(--gold)}
#splash .tag{font-size:10px;color:var(--muted);letter-spacing:.14em;margin-top:8px;
text-transform:uppercase;animation:fadeIn .8s .55s both}

.hidden{display:none!important}
.badge{font-family:Oswald;font-size:9px;letter-spacing:.06em;text-transform:uppercase;
border-radius:100px;padding:4px 9px;display:inline-block}
.exline{display:flex;align-items:center;gap:9px;padding:10px 0;border-bottom:1px solid var(--line)}
.exline:last-child{border:none}
.kg-input{width:64px;background:var(--panel2);border:1.5px solid var(--line);border-radius:10px;
padding:9px 6px;color:var(--ink);font-size:15px;font-family:Oswald;outline:none;text-align:center}
.kg-input:focus{border-color:var(--gold)}

/* chat coach */
.chatbox{background:var(--panel);border:1px solid var(--line);border-radius:16px;
padding:12px;min-height:220px;max-height:46vh;overflow-y:auto;display:flex;
flex-direction:column;gap:8px}
.bubble{background:var(--panel2);border:1px solid var(--line);border-radius:14px 14px 14px 4px;
padding:11px 13px;font-size:13.5px;line-height:1.55;max-width:88%;align-self:flex-start;
animation:slideUp .3s cubic-bezier(.22,.9,.3,1)}
.bubble.me{background:rgba(242,178,51,.12);border-color:var(--gold-line);
border-radius:14px 14px 4px 14px;align-self:flex-end}
.chip{flex:none;background:var(--panel);border:1px solid var(--gold-line);color:var(--gold);
border-radius:100px;padding:8px 13px;font-family:Oswald;font-size:11px;letter-spacing:.04em;
text-transform:uppercase;cursor:pointer;transition:transform .15s}
.chip:active{transform:scale(.93)}

/* stats accueil */
.statgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:11px}
.stat{background:var(--panel);border:1px solid var(--gold-line);border-radius:16px;
padding:14px;text-align:center}
.stat .v{font-family:Oswald;font-weight:700;font-size:26px;line-height:1}
.stat .l{font-size:9.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-top:6px}

/* badges */
.badgegrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.badgecard{background:var(--panel);border:1px solid var(--line);border-radius:13px;
padding:11px 6px;text-align:center;color:var(--muted);opacity:.42;transition:all .3s}
.badgecard.got{opacity:1;border-color:var(--gold-line);color:var(--ink);
background:linear-gradient(160deg,var(--panel),rgba(242,178,51,.06));animation:pop .4s}

/* bouton coach central */
.tab.center{position:relative;overflow:visible}
.tab.center .cbtn{width:54px;height:54px;border-radius:50%;display:flex;align-items:center;
justify-content:center;font-size:23px;margin-top:-26px;
background:linear-gradient(145deg,var(--gold),var(--gold-dim));color:#1a1206;
box-shadow:0 5px 18px rgba(242,178,51,.4);border:3px solid var(--bg);
transition:transform .2s cubic-bezier(.34,1.56,.64,1)}
.tab.center:active .cbtn{transform:scale(.9)}
.tab.center.on .cbtn{transform:translateY(-3px) scale(1.06);
box-shadow:0 7px 24px rgba(242,178,51,.55)}
.tab.center .lb{color:var(--gold);margin-top:3px}

/* anneau de forme */
.scorering{position:relative;width:150px;height:150px;margin:6px auto 10px;cursor:pointer}
.scorering .track{fill:none;stroke:var(--panel2);stroke-width:10}
.scorenum{position:absolute;inset:0;display:flex;flex-direction:column;
align-items:center;justify-content:center}

/* roadmap de phases */
.roadmap{display:flex;gap:6px;overflow-x:auto;padding:4px 0 10px;align-items:center;
-webkit-overflow-scrolling:touch}
.phasechip{flex:none;background:var(--panel);border:1px solid var(--line);color:var(--muted);
border-radius:11px;padding:8px 11px;font-family:Oswald;font-size:10px;letter-spacing:.05em;
text-transform:uppercase;text-align:center;transition:all .3s}
.phasechip.done{border-color:rgba(78,208,122,.4);color:var(--ok);opacity:.75}
.phasechip.cur{border:1.5px solid var(--gold);color:var(--gold);
background:rgba(242,178,51,.09);animation:glowPulse 2.6s infinite;transform:scale(1.05)}
.roadmap .arrow{color:var(--muted);font-family:Oswald;flex:none}

/* puces RPE */
.rpechip{flex:1;padding:11px 4px;border-radius:10px;cursor:pointer;font-family:Oswald;
font-weight:700;font-size:15px;background:var(--panel2);border:1.5px solid var(--line);
color:var(--muted);transition:all .18s cubic-bezier(.34,1.56,.64,1)}
.rpechip:active{transform:scale(.9)}
.rpechip.sel{background:var(--gold);border-color:var(--gold);color:#1a1206;animation:bounce .3s}
</style>
</head>
<body>
<div id="splash">
  <div class="logo">JC</div>
  <div class="t">PT MOUSS <span>IA</span></div>
  <div class="tag">Discipline today, results tomorrow</div>
</div>

<div id="app">
  <div class="top">
    <div class="jc">JC</div>
    <div>
      <div class="brand">PT MOUSS <span>IA</span></div>
      <div class="brand-sub">JIGI Coaching</div>
    </div>
    <div class="top-right" id="topRight"></div>
  </div>

  <div class="screen" id="screen"></div>

  <div class="tabbar" id="tabbar"></div>
</div>

<script src="app.js"></script>
<script>
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{});}
window.addEventListener('load',()=>setTimeout(()=>document.getElementById('splash').classList.add('off'),900));
</script>
</body>
</html>
